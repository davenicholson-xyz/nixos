# Previx to Ctrl-A
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Split windows
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Naviate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8

# Switch windows
bind -n C-h previous-window
bind -n C-l next-window

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Gruvbox tmux color scheme

# Status bar
set -g status-style "bg=#3c3836,fg=#ebdbb2"
set -g status-left-length 40
set -g status-right-length 60

# Left: session name
set -g status-left "#[bg=#d79921,fg=#1d2021,bold] #S #[bg=#3c3836,fg=#d79921]"

# Right: time & host
set -g status-right "#[fg=#928374]%H:%M #[fg=#504945]| #[fg=#928374]%d %b"

# Window tabs (inactive)
set -g window-status-format " #[fg=#928374]#I:#W "
set -g window-status-current-format "#[bg=#504945,fg=#fbf1c7,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#d79921"

# Command/message line
set -g message-style "bg=#d79921,fg=#1d2021,bold"
set -g message-command-style "bg=#3c3836,fg=#ebdbb2"

# Selection in copy mode
set -g mode-style "bg=#d65d0e,fg=#1d2021"
